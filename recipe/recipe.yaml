schema_version: 1

context:
  version: "0.1.1"

package:
  name: jupyverse-kernel
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/j/jupyverse-kernel/jupyverse_kernel-${{ version }}.tar.gz
    sha256: 6a1e2caa47ab1506e2e9530bc8d6ce43f74353f923ba81682d710c8046dac24b

build:
  noarch: python
  number: 0
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - uv-build
  run:
    - python >=${{ python_min }}
    - anyio

tests:
  - python:
      imports: jupyverse_kernel
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/api/kernel
  summary: The API for Jupyverse's kernel.

extra:
  recipe-maintainers:
    - davidbrochart
